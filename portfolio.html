<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Ali - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #6a11cb, #2575fc, #ff4b1f, #ff9068);
            background-size: 800% 800%;
            animation: gradientBG 20s ease infinite;
            color: #fff;
        }

        @keyframes gradientBG {
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 50px;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        h1 { font-size: 3em; margin-bottom: 10px; color: #ffeb3b; }
        h2 { font-size: 2em; margin: 20px 0 10px; color: #fff; }
        p { font-size: 1.2em; margin-bottom: 30px; color: #f0f0f0; }

        a {
            color: #ffeb3b;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        a:hover { color: #fff; }

        .button {
            display: inline-block;
            background: linear-gradient(45deg, #ff0000, #ff4b1f);
            color: #fff;
            padding: 15px 35px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #ddd;
        }

        @media(max-width: 768px){
            h1 { font-size: 2.5em; }
            h2 { font-size: 1.8em; }
            p { font-size: 1em; }
            .container { padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Introduction</h1>
        <h2>Name: Muhammad Ali</h2>
        <p>
            I am a YouTuber, making videos on tools like <strong>ChatGPT, Canva, CapCut, YouTube</strong> 
            providing tips & tricks and exclusive insights you shouldn't know before.
        </p>

        <h2>Contact Me</h2>
        <p>
            Instagram: <a href="https://www.instagram.com/ali_bussineshub?igsh=M2R0OWd3bnU4ZGpy" target="_blank">@ali_bussineshub</a>
        </p>

        <h2>My YouTube Channel</h2>
        <p>
            <a href="https://www.youtube.com/@SmartCreatorAi01" target="_blank">SmartCreatorAI</a>
        </p>

        <button class="button" onclick="window.open('https://www.youtube.com/@SmartCreatorAi01?sub_confirmation=1','_blank')">
            Subscribe
        </button>

        <footer>Website made by:- Muhammad Ali</footer>
    </div>
</body>
</html>
